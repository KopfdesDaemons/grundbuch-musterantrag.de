<app-dashboard-tile tileTitle="Migration">
  <div class="content">
    @if (error()) {
      <app-error-display [error]="error()!"></app-error-display>
    }
    @if (responseText()) {
      <p class="responseText">{{ responseText() }}</p>
    }
    @if (isLoading()) {
      <app-progress-spinner [endless]="true"></app-progress-spinner>
    }
    <select #migrationDropdown [(ngModel)]="selectedMigration" (change)="reset()">
      @for (migration of migrationS.migrations; track migration.name) {
        <option [ngValue]="migration">{{ migration.name }}</option>
      }
    </select>
    <p>{{ selectedMigration.description }}</p>
    <button
      (click)="migrate()"
      [disabled]="userHasPermissionsMigrate() ? false : true"
      [title]="userHasPermissionsMigrate() ? '' : 'Sie haben nicht die erforderlichen Berechtigungen, um diese Aktion durchzuführen.'"
    >
      Migration durchführen
    </button>
  </div>
</app-dashboard-tile>
